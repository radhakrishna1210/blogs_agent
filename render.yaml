services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: aperture-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false          # Set in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false          # https://aperture-backend.onrender.com/auth/google/callback
      - key: FRONTEND_URL
        sync: false          # https://aperture-frontend.onrender.com
      - key: BACKEND_URL
        sync: false          # https://aperture-backend.onrender.com
      - key: CRON_SECRET
        sync: false

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: aperture-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false          # https://aperture-backend.onrender.com
