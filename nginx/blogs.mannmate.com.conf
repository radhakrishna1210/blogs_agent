# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name blogs.mannmate.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name blogs.mannmate.com;

    # SSL — issued by: sudo certbot --nginx -d blogs.mannmate.com
    ssl_certificate     /etc/letsencrypt/live/blogs.mannmate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blogs.mannmate.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase body size limit for image/file uploads
    client_max_body_size 20M;

    # ── Backend: /api/* ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend: /auth/* (Google OAuth) ───────────────────────────────────────
    location /auth/ {
        proxy_pass         http://localhost:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend: /uploads/* (static uploaded files) ───────────────────────────
    location /uploads/ {
        proxy_pass         http://localhost:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend: everything else → Next.js ───────────────────────────────────
    location / {
        proxy_pass         http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
